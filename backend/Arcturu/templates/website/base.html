<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minecraft Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/site.css">
    {% block header_extra %}{% endblock %}
  </head>
  <body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black py-3">
      <div class="site-container d-flex align-items-center">
        <a class="navbar-brand me-3" href="#">MC Server</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav mx-auto nav-pills">
            <li class="nav-item"><a class="nav-link active" href="/">Главная</a></li>
            <li class="nav-item"><a class="nav-link" href="/about/news/">О сервере</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Вики</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Донат</a></li>
          </ul>
          <div class="d-flex align-items-center ms-auto">
            {% if server_address %}
            <span class="ip-badge">{{ server_address }}</span>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    {% block hero %}
    <!-- Hero slot: вставьте баннер/карусель сюда -->
    <div class="container my-4">
      <div class="placeholder-slot hero-slot">Hero placeholder — вставьте баннер сюда</div>
    </div>
    {% endblock %}

    <main class="container my-5">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block footer_scripts %}{% endblock %}
  </body>
</html>
