{% extends 'website/base.html' %}

{% block content %}
  <div class="row">
    <div class="col-md-8">
      <h2>{{ news.title }}</h2>
      <p class="text-muted">{{ news.category }} — {{ news.created|date:'d M Y' }}</p>
      <img src="/static/{{ news.image|default:'images/news-placeholder.svg' }}" class="img-fluid rounded mb-3 shadow-lg" alt="">
      <div class="text-white">{{ news.content|linebreaks }}</div>
    </div>
    <div class="col-md-4">
      {% block sidebar %}
      <div class="placeholder-slot">Sidebar placeholder — вставьте сайдбар/виджеты здесь</div>
      {% endblock %}
    </div>
  </div>
{% endblock %}
